<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}CPA Billing{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
{% if auth or admin_auth %}
<header>
  <a class="brand" href="{{ '/' if auth else '/admin' }}">CPA Billing</a>
  <nav aria-label="主导航">
    {% if auth %}
    <a href="/">全局账单</a>
    <a href="/me">我的 Key</a>
    {% else %}
    <a href="/admin">系统管理</a>
    {% endif %}
  </nav>
  {% if auth %}
  <form method="post" action="/auth/logout">
    <input type="hidden" name="_csrf" value="{{ auth[0].csrf_token }}">
    <button class="secondary" type="submit">退出</button>
  </form>
  {% else %}
  <form method="post" action="/auth/admin/logout">
    <input type="hidden" name="_csrf" value="{{ admin_auth.csrf_token }}">
    <button class="secondary" type="submit">退出管理</button>
  </form>
  {% endif %}
</header>
{% endif %}
<main>{% block content %}{% endblock %}</main>
<script src="/static/app.js"></script>
</body>
</html>
