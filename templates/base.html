<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}CPA Billing{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
{% if auth %}
<header>
  <a class="brand" href="/">CPA Billing</a>
  <nav><a href="/">全局</a><a href="/me">我的 Key</a>{% if auth[1].is_admin %}<a href="/admin">管理</a>{% endif %}</nav>
  <form method="post" action="/auth/logout"><button class="icon" title="退出" data-csrf="{{ auth[0].csrf_token }}">退出</button></form>
</header>
{% endif %}
<main>{% block content %}{% endblock %}</main>
<script src="/static/app.js"></script>
</body>
</html>
