{% extends "base.html" %}
{% block title %}管理登录 · CPA Billing{% endblock %}
{% block content %}
<section class="login-panel">
  <h1>系统管理</h1>
  <p>管理会话与用户 API Key 会话完全独立。</p>
  {% if error %}<p class="alert error" role="alert">{{ error }}</p>{% endif %}
  <form method="post" action="/auth/admin/login" class="stack-form">
    <label>管理 Token
      <input name="management_token" type="password" autocomplete="current-password" required autofocus>
    </label>
    <button type="submit">进入管理面板</button>
  </form>
  <a class="text-link" href="/login">返回用户登录</a>
</section>
{% endblock %}
