{% extends "base.html" %}
{% block content %}
<section class="login-panel">
  <h1>等待 Telegram 确认</h1>
  {% if notification_sent %}<p class="alert success">确认指令已发送到你的 Telegram 私聊。</p>{% else %}<p class="alert warning">Telegram 通知发送失败，请手动执行下面的确认指令。</p>{% endif %}
  <pre>/confirm {{ token }}</pre>
  <p class="muted">确认令牌将在几分钟后失效，且只能使用一次。</p>
  <a class="button" href="/me">返回我的 Key</a>
</section>
{% endblock %}
